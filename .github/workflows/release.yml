name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ruby ruby-dev patchelf desktop-file-utils appstream \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-4.0 gir1.2-adw-1 \
            libgirepository-1.0-1 libcairo2 pkg-config \
            fuse libfuse2
          
      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool

      - name: Install build deps
        run: |
          sudo gem install --no-document fpm
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pyinstaller

      - name: Run tests
        run: pytest -q

      - name: Build AppImage
        run: bash packaging/build_appimage.sh

      - name: Build deb
        run: bash packaging/build_deb.sh

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag_name="${GITHUB_REF_NAME}"
          gh release create "$tag_name" \
            --title "$tag_name" \
            --generate-notes

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag_name="${GITHUB_REF_NAME}"
          gh release upload "$tag_name" dist/*.AppImage dist/*.deb --clobber
